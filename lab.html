<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bjarki björnsson | lab</title>
    <link rel="stylesheet" href="style.css"> <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f4f4f4; cursor: inherit; }
        
        /* The UI Layer */
        #lab-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            padding: 15px 25px;
            border-radius: 50px;
        }

        .control-btn {
            background: none;
            border: 1px solid #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #f4f4f4;
        }

        .control-btn:hover { background: #000; color: #fff; }
        .control-btn.active { background: #000; color: #fff; }

        #canvas-container { position: absolute; inset: 0; z-index: 1; }
        
        /* Update your back-link to handle dark backgrounds */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            text-decoration: none;
            color: #f4f4f4;
            mix-blend-mode: difference; /* This makes it white on black and black on white! */
        }
    </style>
      <link rel="icon" type="image/webp" href="cursors/pauseblend1.webp">
</head>
<body>

    <a href="index.html" class="back-link">← back</a>

        <div id="overlay-instructions" style="cursor: url('cursors/playblend1.webp'), pointer;">
            <div class="glass-card">
                
                <p>"Be yourself one hundred and one thousand percent"
                    <br><br>
                    - Lil B
                </p>
            </div>
        </div>

    <div id="lab-controls">
        <button class="control-btn active" onclick="updateMode('minimal')">minimal</button>
        <button class="control-btn" onclick="updateMode('spray')">spray</button>
        <button class="control-btn" id="shape-toggle" onclick="toggleShape()">shape: circle</button>
        <button class="control-btn" id="invert-toggle" onclick="toggleInvert()">invert</button>
        <button class="control-btn" onclick="clearCanvas()">clear</button>
        <button class="control-btn" onclick="saveArt()">save (.jpg)</button>
    </div>

    <div id="canvas-container"></div>

    <script src="lab-script.js"></script>
</body>
</html>
